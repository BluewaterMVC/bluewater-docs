<svg width="700" height="480" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <style>
    .box { fill: #f0f4f8; stroke: #0366d6; stroke-width: 2; rx: 6; ry: 6; }
    .arrow { stroke: #333; stroke-width: 2; marker-end: url(#arrowhead); }
    .label { font-size: 14px; fill: #111; font-weight: bold; text-anchor: middle; }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"></polygon>
    </marker>
  </defs>

  <!-- Boxes -->
  <rect x="250" y="20" width="200" height="40" class="box"></rect>
  <text x="350" y="45" class="label">HTTP Request</text>

  <rect x="250" y="80" width="200" height="50" class="box"></rect>
  <text x="350" y="110" class="label">Router</text>

  <rect x="250" y="150" width="200" height="50" class="box"></rect>
  <text x="350" y="180" class="label">Dispatcher</text>

  <rect x="250" y="220" width="200" height="50" class="box"></rect>
  <text x="350" y="250" class="label">Controller Handler</text>

  <rect x="250" y="290" width="200" height="50" class="box"></rect>
  <text x="350" y="320" class="label">Responder</text>

  <rect x="250" y="360" width="200" height="50" class="box"></rect>
  <text x="350" y="390" class="label">HTTP Response</text>

  <!-- Arrows -->
  <line x1="350" y1="60" x2="350" y2="80" class="arrow"></line>
  <line x1="350" y1="130" x2="350" y2="150" class="arrow"></line>
  <line x1="350" y1="200" x2="350" y2="220" class="arrow"></line>
  <line x1="350" y1="270" x2="350" y2="290" class="arrow"></line>
  <line x1="350" y1="340" x2="350" y2="360" class="arrow"></line>

  <!-- Side note: Middleware -->
  <rect x="480" y="150" width="160" height="50" class="box"></rect>
  <text x="560" y="180" class="label">Middleware Stack</text>
  <line x1="450" y1="175" x2="480" y2="175" class="arrow"></line>
</svg>
