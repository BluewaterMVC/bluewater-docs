  <text x="120" y="480" class="folder">└── src/Bluewater/</text>
  <text x="140" y="510" class="folder">├── Router/</text>
  <text x="140" y="540" class="folder">├── Dispatcher/</text>
  <text x="140" y="570" class="folder">├── Middleware/</text>
