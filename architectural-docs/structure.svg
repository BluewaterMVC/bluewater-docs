<svg width="750" height="680" xmlns="http://www.w3.org/2000/svg" font-family="monospace" font-size="14">
  <style>
    .folder { font-weight: bold; fill: #003366; }
    .file { fill: #444; }
  </style>

  <!-- Title -->
  <text x="20" y="30" class="folder">bluewater-project/</text>

  <!-- Top-level folders -->
  <text x="40" y="60" class="folder">├── app/</text>
  <text x="40" y="90" class="folder">├── bin/</text>
